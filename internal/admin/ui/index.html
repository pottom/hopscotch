<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hopscotch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><circle cx='6' cy='26' r='5' fill='%2338bdf8'/><circle cx='30' cy='26' r='5' fill='%23818cf8'/><path d='M11 26 Q18 7 25 26' stroke='%2338bdf8' stroke-width='2.5' stroke-linecap='round' fill='none'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ansi_up@4/ansi_up.js"></script>
  <!-- app.js must load before Alpine so alpine:init listener is registered first -->
  <script src="/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data>

<header class="header">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="6"  cy="26" r="5" fill="#38bdf8" opacity=".9"/>
      <circle cx="30" cy="26" r="5" fill="#818cf8" opacity=".9"/>
      <path d="M11 26 Q18 7 25 26" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <circle id="hop-dot" cx="18" cy="14.5" r="2.6" fill="#38bdf8" opacity=".85"/>
      <defs>
        <linearGradient id="g" x1="11" y1="26" x2="25" y2="26" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#38bdf8"/>
          <stop offset="100%" stop-color="#818cf8"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="logo-wordmark">hopscotch</span>
  </div>

  <span class="badge" :class="$store.hop.meta.status" x-text="$store.hop.meta.status"></span>
  <div class="header-meta">
    <span x-text="$store.hop.meta.version"></span>
    <span class="header-sep">·</span>
    <span x-text="'PID ' + $store.hop.meta.pid"></span>
    <span class="header-sep">·</span>
    <span x-text="'up ' + $store.hop.meta.uptime"></span>
  </div>
</header>

<nav class="tab-bar" id="tab-bar">
  <a class="active" data-tab="status" href="#" onclick="switchTab('status');return false">Status</a>
  <a data-tab="logs"   href="#" onclick="switchTab('logs');return false">Logs</a>
  <a data-tab="docs"   href="#" onclick="switchTab('docs');return false">Docs</a>
</nav>

<!-- ── STATUS TAB ─────────────────────────────────────────────────────────── -->
<div id="panel-status" class="tab-panel active" style="flex-direction:column;">

  <div class="stats-bar">
    <span class="stats-in"   x-text="'↓ ' + fmtBytes($store.hop.totalStats().bpsIn)  + '/s'"></span>
    <span class="stats-sep">·</span>
    <span class="stats-out"  x-text="'↑ ' + fmtBytes($store.hop.totalStats().bpsOut) + '/s'"></span>
    <span class="stats-sep">·</span>
    <span class="stats-conn" x-text="$store.hop.totalStats().active + ' conn total'"></span>
  </div>

  <main class="main">
    <div class="section-label">Tunnels</div>

    <template x-for="name in $store.hop.tunnelList()" :key="name">
      <div class="tc-card"
           :class="$store.hop.visualStatus(name)"
           x-init="$nextTick(() => initChart(name, $el))">

        <div class="tc-header">
          <div class="tc-id">
            <span class="tc-name" x-text="name"></span>
            <span class="tc-host" x-text="$store.hop.tunnels[name]?.host"></span>
          </div>

          <div class="tc-status-group">
            <span class="dot" :class="$store.hop.visualStatus(name)"></span>
            <span class="status-label"
                  :class="$store.hop.visualStatus(name)"
                  x-text="$store.hop.tunnels[name]?.status || '…'"></span>
            <span class="tc-ka-warn"
                  x-show="$store.hop.tunnels[name]?.keepalive_failures > 0"
                  x-text="'⚠ ' + $store.hop.tunnels[name]?.keepalive_failures"></span>
          </div>

          <div class="tc-info">
            <span class="tc-info-item"
                  x-text="':' + ($store.hop.tunnels[name]?.local_port || '…')"></span>
            <span class="tc-info-item"
                  x-text="fmtUptime($store.hop.tunnels[name]?.uptime_seconds)"></span>
            <span class="tc-info-item tc-recon"
                  x-show="$store.hop.tunnels[name]?.reconnect_count > 0"
                  x-text="'recon ' + $store.hop.tunnels[name]?.reconnect_count"></span>
            <span class="tc-info-item tc-reconnect-cd"
                  x-show="$store.hop.tunnels[name]?.status === 'connecting' && $store.hop.tunnels[name]?.reconnect_in != null && $store.hop.tunnels[name]?.reconnect_in >= 0"
                  x-text="'next in ' + $store.hop.tunnels[name]?.reconnect_in + 's'"></span>
          </div>

          <div class="tc-bps">
            <span class="tc-bps-in"
                  x-text="'↓ ' + fmtBytes($store.hop.tunnels[name]?.bps_in) + '/s'"></span>
            <span class="tc-bps-out"
                  x-text="'↑ ' + fmtBytes($store.hop.tunnels[name]?.bps_out) + '/s'"></span>
            <span class="tc-active"
                  x-text="($store.hop.tunnels[name]?.active || 0) + ' conn'"></span>
          </div>
        </div>

        <div class="tc-reason"
             :class="$store.hop.tunnels[name]?.last_error ? 'has-error' : 'no-error'"
             x-text="$store.hop.tunnels[name]?.last_error || '—'"></div>

        <div class="tc-chart-wrap">
          <canvas class="tc-canvas"></canvas>
        </div>
      </div>
    </template>

    <div class="empty" x-show="$store.hop.tunnelList().length === 0">loading…</div>

    <div class="tc-card tc-direct"
         x-init="$nextTick(() => initChart('direct', $el))">
      <div class="tc-header">
        <div class="tc-id">
          <span class="tc-name">direct</span>
        </div>
        <div class="tc-bps">
          <span class="tc-bps-in"
                x-text="'↓ ' + fmtBytes($store.hop.direct.bps_in) + '/s'"></span>
          <span class="tc-bps-out"
                x-text="'↑ ' + fmtBytes($store.hop.direct.bps_out) + '/s'"></span>
          <span class="tc-active"
                x-text="$store.hop.direct.active + ' conn'"></span>
        </div>
      </div>
      <div class="tc-reason no-error">—</div>
      <div class="tc-chart-wrap">
        <canvas class="tc-canvas"></canvas>
      </div>
    </div>
  </main>

</div>

<!-- ── LOGS TAB ───────────────────────────────────────────────────────────── -->
<div id="panel-logs" class="tab-panel">
  <div class="log-wrap">
    <div class="log-label">Live log stream</div>
    <div class="log-scroll" id="log-scroll"></div>
  </div>
</div>

<!-- ── DOCS TAB ───────────────────────────────────────────────────────────── -->
<div id="panel-docs" class="tab-panel">
  <div class="docs-wrap">
    <div class="docs-body" id="docs-content">
      <p style="color:var(--muted)">Loading…</p>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-ports">
    <div class="port-item">
      <span>SOCKS5</span>
      <span x-text="':' + $store.hop.meta.proxy_port"></span>
    </div>
    <div class="port-item">
      <span>ADMIN</span>
      <span x-text="':' + $store.hop.meta.admin_port"></span>
    </div>
  </div>
  <div id="footer-ts"></div>
</footer>

</body>
</html>
