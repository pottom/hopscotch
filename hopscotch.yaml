  #   local_port: 1081

  - name: go-a-preprod-jump
    host: 10.215.11.2
    port: 22
    user: fouriguser
    identity_file: ~/.ssh/id_rsa
    local_port: 1082

  - name: go-b-preprod-jump
    host: 10.215.27.2
    port: 22
    user: fouriguser
    identity_file: ~/.ssh/id_rsa
    local_port: 1083

proxy:
  port: 8888
  rules:
    # prod rules disabled until AllowTcpForwarding is enabled on SCB servers
    # - pattern: "*.gslb.djdsz.hu"
    #   tunnel: go-a-scb
    # - pattern: "*.ocp4-prod-a.pdjsz.local"
    #   tunnel: go-a-scb
    # - pattern: "*.ocp4-prod-b.pdjsz.local"
    #   tunnel: go-b-scb
    - pattern: "*.tgslb.djdsz.hu"
      tunnel: go-a-preprod-jump
    - pattern: "*.tmlb.djdsz.hu"
      tunnel: go-a-preprod-jump
    - pattern: "*.ocp4-test-a.tdjsz.local"
      tunnel: go-a-preprod-jump
    - pattern: "*.ocp4-test-b.tdjsz.local"
      tunnel: go-b-preprod-jump
    - pattern: "*"
      via: direct

admin:
  port: 8889
  bind: "127.0.0.1"
