<svg width="960" height="500" viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sp-lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <marker id="sp-ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"/>
    </marker>
    <marker id="sp-ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34d399"/>
    </marker>
    <marker id="sp-av" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#fbbf24"/>
    </marker>
    <marker id="sp-as" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="500" fill="#080c14"/>

  <!-- Title bar -->
  <rect width="960" height="40" fill="#161f2e"/>
  <circle cx="20" cy="20" r="5" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="5" fill="#27c93f"/>
  <text x="480" y="25" font-family="'Space Grotesk',system-ui,sans-serif"
        font-size="12" fill="#475569" text-anchor="middle">hopscotch — shared proxy for the whole network</text>
  <line x1="0" y1="40" x2="960" y2="40" stroke="#1a2535" stroke-width="1"/>

  <!-- ══ LEFT: YOUR NETWORK ════════════════════════════════════════════════ -->
  <rect x="12" y="46" width="212" height="418" rx="10" fill="none" stroke="#1a2535" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="118" y="67" font-family="'JetBrains Mono','Courier New',monospace"
        font-size="9.5" font-weight="600" fill="#334155" letter-spacing="1.5" text-anchor="middle">YOUR NETWORK</text>

  <!-- MacBook -->
  <rect x="22" y="74" width="192" height="64" rx="7" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="22" y="74" width="3" height="64" rx="1.5" fill="#38bdf8"/>
  <rect x="33" y="84" width="20" height="13" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.2"/>
  <path d="M30 97 Q30 100 33 100 L53 100 Q56 100 56 97" stroke="#38bdf8" stroke-width="1.2" fill="none" opacity=".6"/>
  <text x="62" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">MacBook</text>
  <text x="40" y="110" font-family="'JetBrains Mono','Courier New',monospace" font-size="8.5" fill="#475569">ALL_PROXY=socks5h://</text>
  <text x="40" y="122" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#38bdf8">192.168.1.10:1080</text>

  <!-- Linux workstation -->
  <rect x="22" y="148" width="192" height="64" rx="7" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="22" y="148" width="3" height="64" rx="1.5" fill="#38bdf8"/>
  <rect x="33" y="158" width="20" height="14" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.2"/>
  <line x1="43" y1="172" x2="43" y2="177" stroke="#38bdf8" stroke-width="1.2" opacity=".5"/>
  <line x1="38" y1="177" x2="48" y2="177" stroke="#38bdf8" stroke-width="1.2" opacity=".5"/>
  <text x="62" y="169" font-family="'Space Grotesk',system-ui,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Linux workstation</text>
  <text x="40" y="184" font-family="'JetBrains Mono','Courier New',monospace" font-size="8.5" fill="#475569">ALL_PROXY=socks5h://</text>
  <text x="40" y="196" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#38bdf8">192.168.1.10:1080</text>

  <!-- Dev server -->
  <rect x="22" y="222" width="192" height="64" rx="7" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="22" y="222" width="3" height="64" rx="1.5" fill="#38bdf8"/>
  <rect x="33" y="232" width="20" height="7" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.2"/>
  <rect x="33" y="242" width="20" height="7" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.2" opacity=".5"/>
  <circle cx="49" cy="235.5" r="1.5" fill="#34d399"/>
  <circle cx="49" cy="245.5" r="1.5" fill="#34d399" opacity=".4"/>
  <text x="62" y="243" font-family="'Space Grotesk',system-ui,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Dev server</text>
  <text x="40" y="258" font-family="'JetBrains Mono','Courier New',monospace" font-size="8.5" fill="#475569">ALL_PROXY=socks5h://</text>
  <text x="40" y="270" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#38bdf8">192.168.1.10:1080</text>

  <!-- Windows PC -->
  <rect x="22" y="296" width="192" height="64" rx="7" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="22" y="296" width="3" height="64" rx="1.5" fill="#38bdf8"/>
  <rect x="33" y="306" width="8" height="7" rx="1" fill="#38bdf8" opacity=".9"/>
  <rect x="43" y="306" width="8" height="7" rx="1" fill="#38bdf8" opacity=".6"/>
  <rect x="33" y="315" width="8" height="7" rx="1" fill="#38bdf8" opacity=".6"/>
  <rect x="43" y="315" width="8" height="7" rx="1" fill="#38bdf8" opacity=".35"/>
  <text x="62" y="317" font-family="'Space Grotesk',system-ui,sans-serif" font-size="13" font-weight="500" fill="#e2e8f0">Windows PC</text>
  <text x="40" y="332" font-family="'JetBrains Mono','Courier New',monospace" font-size="8.5" fill="#475569">System proxy settings</text>
  <text x="40" y="344" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#38bdf8">192.168.1.10:1080</text>

  <text x="118" y="426" font-family="'JetBrains Mono','Courier New',monospace" font-size="8.5" fill="#1a2535" text-anchor="middle">configure once per machine</text>

  <!-- ══ SOCKS5 ARROWS (machines → hopscotch) ═════════════════════════════ -->
  <line x1="214" y1="106" x2="274" y2="268" stroke="#38bdf8" stroke-width="1.2" stroke-dasharray="4,3" opacity=".5" marker-end="url(#sp-ab)"/>
  <line x1="214" y1="180" x2="274" y2="273" stroke="#38bdf8" stroke-width="1.2" stroke-dasharray="4,3" opacity=".5" marker-end="url(#sp-ab)"/>
  <line x1="214" y1="254" x2="274" y2="278" stroke="#38bdf8" stroke-width="1.2" stroke-dasharray="4,3" opacity=".5" marker-end="url(#sp-ab)"/>
  <line x1="214" y1="328" x2="274" y2="283" stroke="#38bdf8" stroke-width="1.2" stroke-dasharray="4,3" opacity=".5" marker-end="url(#sp-ab)"/>
  <text x="242" y="256" font-family="'JetBrains Mono','Courier New',monospace" font-size="8.5" fill="#38bdf8" text-anchor="middle" opacity=".7">SOCKS5</text>

  <!-- ══ HOPSCOTCH ══════════════════════════════════════════════════════════ -->
  <rect x="276" y="46" width="240" height="418" rx="12" fill="#0f1623" stroke="#283548" stroke-width="1.5"/>
  <rect x="276" y="46" width="240" height="4" rx="2" fill="url(#sp-lg)"/>

  <!-- Logo -->
  <circle cx="300" cy="75" r="4.5" fill="#38bdf8" opacity=".9"/>
  <circle cx="320" cy="75" r="4.5" fill="#818cf8" opacity=".9"/>
  <path d="M304.5 75 Q310 63.5 315.5 75" stroke="url(#sp-lg)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <circle cx="310" cy="65" r="2.5" fill="#38bdf8" opacity=".85"/>
  <text x="334" y="81" font-family="'Space Grotesk',system-ui,sans-serif"
        font-size="16" font-weight="600" fill="#e2e8f0" letter-spacing="-0.5">hopscotch</text>
  <text x="292" y="99" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569">192.168.1.10  ·  runs here</text>
  <line x1="288" y1="107" x2="504" y2="107" stroke="#1a2535" stroke-width="1"/>

  <!-- OpenConnect VPN block -->
  <rect x="288" y="113" width="216" height="72" rx="6" fill="#080c14" stroke="#1a2535" stroke-width="1"/>
  <text x="300" y="131" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" font-weight="600" fill="#334155" letter-spacing="1.2">OPENCONNECT VPN</text>
  <line x1="296" y1="137" x2="496" y2="137" stroke="#1a2535" stroke-width=".7"/>
  <circle cx="302" cy="154" r="4" fill="#fbbf24"/>
  <text x="314" y="158" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#e2e8f0">corp-vpn  →  vpn.corp.com</text>
  <text x="300" y="172" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#475569">managed · auto-reconnect on drop</text>
  <text x="300" y="180" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548">opens internal network access</text>

  <!-- SSH Tunnel block -->
  <rect x="288" y="195" width="216" height="72" rx="6" fill="#080c14" stroke="#1a2535" stroke-width="1"/>
  <text x="300" y="213" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" font-weight="600" fill="#334155" letter-spacing="1.2">SSH TUNNEL</text>
  <line x1="296" y1="219" x2="496" y2="219" stroke="#1a2535" stroke-width=".7"/>
  <circle cx="302" cy="236" r="4" fill="#34d399"/>
  <text x="314" y="240" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#e2e8f0">corp-jump  →  10.0.0.10</text>
  <text x="300" y="254" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#475569">requires_vpn: corp-vpn</text>
  <text x="300" y="262" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548">internal-only IP · reachable via VPN</text>

  <!-- SOCKS5 block -->
  <rect x="288" y="277" width="216" height="64" rx="6" fill="#080c14" stroke="#1a2535" stroke-width="1"/>
  <text x="300" y="295" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" font-weight="600" fill="#334155" letter-spacing="1.2">SOCKS5 PROXY</text>
  <line x1="296" y1="301" x2="496" y2="301" stroke="#1a2535" stroke-width=".7"/>
  <text x="300" y="320" font-family="'JetBrains Mono','Courier New',monospace" font-size="14" fill="#38bdf8">0.0.0.0:1080</text>
  <text x="300" y="333" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#334155">bind: 0.0.0.0  ← any LAN client</text>

  <!-- Config block -->
  <rect x="288" y="351" width="216" height="105" rx="6" fill="#080c14" stroke="#1a2535" stroke-width="1"/>
  <text x="300" y="369" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" font-weight="600" fill="#334155" letter-spacing="1.2">CONFIG</text>
  <line x1="296" y1="375" x2="496" y2="375" stroke="#1a2535" stroke-width=".7"/>
  <text x="300" y="390" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569">vpn:  type: <tspan fill="#fbbf24">openconnect</tspan></text>
  <text x="300" y="404" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569">  server: vpn.corp.com</text>
  <text x="300" y="418" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569">proxy:  port: <tspan fill="#38bdf8">1080</tspan></text>
  <text x="300" y="432" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569">  bind: <tspan fill="#fbbf24">0.0.0.0</tspan>  <tspan fill="#283548"># ← key setting</tspan></text>
  <text x="300" y="446" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569">  rules: *.corp → <tspan fill="#818cf8">corp-jump</tspan></text>

  <!-- VPN arrow → corporate VPN gateway (horizontal, amber) -->
  <line x1="516" y1="149" x2="526" y2="149" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#sp-av)"/>
  <text x="521" y="143" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#fbbf24" text-anchor="middle">HTTPS</text>

  <!-- SSH arrow → corporate bastion (horizontal, green) -->
  <line x1="516" y1="231" x2="526" y2="231" stroke="#34d399" stroke-width="1.8" marker-end="url(#sp-ag)"/>
  <text x="521" y="225" font-family="'JetBrains Mono','Courier New',monospace" font-size="7.5" fill="#34d399" text-anchor="middle">SSH</text>

  <!-- ══ RIGHT: CORPORATE NETWORK ══════════════════════════════════════════ -->
  <rect x="528" y="46" width="420" height="418" rx="10" fill="none" stroke="#283548" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="738" y="67" font-family="'JetBrains Mono','Courier New',monospace"
        font-size="9.5" font-weight="600" fill="#334155" letter-spacing="1.5" text-anchor="middle">CORPORATE NETWORK</text>

  <!-- VPN Gateway -->
  <rect x="538" y="113" width="400" height="72" rx="8" fill="#0f1623" stroke="#fbbf24" stroke-width="1.2"/>
  <rect x="538" y="113" width="3" height="72" rx="1.5" fill="#fbbf24"/>
  <text x="556" y="136" font-family="'Space Grotesk',system-ui,sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">VPN Gateway</text>
  <text x="556" y="151" font-family="'JetBrains Mono','Courier New',monospace" font-size="10.5" fill="#fbbf24">vpn.corp.com</text>
  <text x="556" y="167" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569">internet-facing  ·  OpenConnect / AnyConnect endpoint</text>
  <text x="556" y="178" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548">establishes encrypted tunnel · hands out internal IP to hopscotch</text>

  <!-- Arrow: VPN Gateway → Bastion -->
  <line x1="738" y1="186" x2="738" y2="193" stroke="#34d399" stroke-width="1.5" marker-end="url(#sp-ag)"/>
  <text x="752" y="192" font-family="'JetBrains Mono','Courier New',monospace" font-size="8" fill="#334155">via VPN</text>

  <!-- Bastion -->
  <rect x="538" y="195" width="400" height="72" rx="8" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="538" y="195" width="3" height="72" rx="1.5" fill="#34d399"/>
  <text x="556" y="218" font-family="'Space Grotesk',system-ui,sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">SSH Bastion</text>
  <text x="556" y="233" font-family="'JetBrains Mono','Courier New',monospace" font-size="10.5" fill="#34d399">10.0.0.10  <tspan fill="#283548" font-size="9">(internal IP · not internet-reachable)</tspan></text>
  <text x="556" y="249" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569">SSH jump host  ·  only reachable from inside the VPN</text>
  <text x="556" y="260" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548">forwards tunnel traffic to all internal resources</text>

  <!-- Arrow: Bastion → Keycloak -->
  <line x1="738" y1="268" x2="738" y2="275" stroke="#475569" stroke-width="1.5" marker-end="url(#sp-as)"/>

  <!-- Keycloak (emphasized) -->
  <rect x="538" y="277" width="400" height="106" rx="8" fill="#0f1623" stroke="#818cf8" stroke-width="1.2"/>
  <rect x="538" y="277" width="3" height="106" rx="1.5" fill="#818cf8"/>
  <text x="556" y="300" font-family="'Space Grotesk',system-ui,sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Keycloak SSO</text>
  <text x="556" y="316" font-family="'JetBrains Mono','Courier New',monospace" font-size="10.5" fill="#818cf8">sso.corp.internal</text>
  <line x1="546" y1="324" x2="930" y2="324" stroke="#1a2535" stroke-width=".7"/>
  <text x="556" y="340" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569">Browser opens login page · cookies work across redirects</text>
  <text x="556" y="355" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569">SSO tokens reach all internal apps automatically</text>
  <text x="556" y="370" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#334155">accessible from every LAN machine — no per-machine VPN client</text>

  <!-- Arrow: Keycloak → Internal -->
  <line x1="738" y1="384" x2="738" y2="391" stroke="#475569" stroke-width="1.5" marker-end="url(#sp-as)"/>

  <!-- Internal services -->
  <rect x="538" y="393" width="400" height="67" rx="8" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="538" y="393" width="3" height="67" rx="1.5" fill="#475569"/>
  <text x="556" y="413" font-family="'Space Grotesk',system-ui,sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Internal services  <tspan font-size="10" fill="#475569">*.corp.internal · 10.0.0.0/8</tspan></text>
  <line x1="546" y1="420" x2="930" y2="420" stroke="#1a2535" stroke-width=".7"/>
  <text x="556" y="435" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569">Grafana · Jenkins · CI · internal APIs · Git repos</text>
  <text x="556" y="449" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548">all routed through the shared SSH tunnel</text>

  <!-- Footer -->
  <line x1="0" y1="464" x2="960" y2="464" stroke="#1a2535" stroke-width="1"/>
  <text x="480" y="484" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#334155" text-anchor="middle">hopscotch manages the VPN · opens the SSH tunnel through it · binds SOCKS5 on 0.0.0.0 so every LAN machine can share it</text>
</svg>
