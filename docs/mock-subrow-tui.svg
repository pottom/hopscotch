  <text x="118" y="58" font-family="'JetBrains Mono','Courier New',monospace"
        font-size="10" fill="#475569">v0.6.1</text>
  <rect x="158" y="45" width="62" height="18" rx="9"
        fill="rgba(248,113,113,.1)" stroke="rgba(248,113,113,.25)" stroke-width="1"/>
  <text x="189" y="57" font-family="'JetBrains Mono','Courier New',monospace"
        font-size="8.5" fill="#f87171" text-anchor="middle" letter-spacing=".5">● degraded</text>
  <text x="234" y="58" font-family="'JetBrains Mono','Courier New',monospace"
        font-size="10" fill="#475569">PID 48219 · up 3h 22m</text>
  <!-- tabs -->
  <text x="680" y="58" font-family="'Space Grotesk',system-ui,sans-serif"
        font-size="12" font-weight="700" fill="#38bdf8">Status</text>
  <line x1="680" y1="71" x2="718" y2="71" stroke="#38bdf8" stroke-width="2"/>
  <text x="736" y="58" font-family="'Space Grotesk',system-ui,sans-serif"
