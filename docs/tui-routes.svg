  <line x1="20" y1="196" x2="940" y2="196" stroke="#1a2535" stroke-width=".7"/>

  <!-- ══ ROW 3 ═══════════════════════════════════════════════════════════ -->
  <text x="48" y="218" font-family="'JetBrains Mono','Courier New',monospace"
