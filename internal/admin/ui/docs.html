<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hopscotch — docs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><circle cx='6' cy='26' r='5' fill='%2338bdf8'/><circle cx='30' cy='26' r='5' fill='%23818cf8'/><path d='M11 26 Q18 7 25 26' stroke='%2338bdf8' stroke-width='2.5' stroke-linecap='round' fill='none'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    .docs-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 3rem;
    }

    .docs-body h1 { font-size: 1.6rem; font-weight: 600; color: #e2e8f0; margin-bottom: 0.25rem; }
    .docs-body h2 { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; margin-top: 2rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    .docs-body h3 { font-size: 0.95rem; font-weight: 600; color: #cbd5e1; margin-top: 1.5rem; margin-bottom: 0.5rem; }

    .docs-body p { color: var(--text); line-height: 1.7; margin-bottom: 0.75rem; }
    .docs-body li { color: var(--text); line-height: 1.7; }
    .docs-body ul, .docs-body ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }

    .docs-body code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.4em;
      color: #94d1f5;
    }

    .docs-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .docs-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.82rem;
      color: #cbd5e1;
    }

    .docs-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .docs-body th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .docs-body td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
      vertical-align: top;
    }

    .docs-body a { color: var(--accent); text-decoration: none; }
    .docs-body a:hover { text-decoration: underline; }

    .docs-body blockquote {
      border-left: 3px solid var(--accent2);
      margin: 0 0 1rem;
      padding: 0.5rem 1rem;
      color: var(--muted);
    }

    @media (max-width: 580px) {
      .docs-body { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="6"  cy="26" r="5" fill="#38bdf8" opacity=".9"/>
      <circle cx="30" cy="26" r="5" fill="#818cf8" opacity=".9"/>
      <path d="M11 26 Q18 7 25 26" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <defs>
        <linearGradient id="g" x1="11" y1="26" x2="25" y2="26" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#38bdf8"/>
          <stop offset="100%" stop-color="#818cf8"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="logo-wordmark">hopscotch</span>
  </div>
  <nav class="header-nav">
    <a href="/">Status</a>
    <a href="/docs.html" class="active">Docs</a>
  </nav>
</header>

<div class="docs-body" id="content">
  <p style="color:var(--muted)">Loading…</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch('/readme')
    .then(r => r.text())
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
      document.title = 'hopscotch — docs';
    })
    .catch(() => {
      document.getElementById('content').innerHTML =
        '<p style="color:var(--muted)">Could not load documentation.</p>';
    });
</script>
</body>
</html>
