<svg width="960" height="420" viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fc-lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <marker id="fc-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"/>
    </marker>
    <marker id="fc-ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34d399"/>
    </marker>
    <marker id="fc-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#818cf8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="420" fill="#080c14"/>

  <!-- Title bar -->
  <rect width="960" height="40" fill="#161f2e"/>
  <circle cx="20" cy="20" r="5" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="5" fill="#27c93f"/>
  <text x="480" y="25" font-family="'Space Grotesk',system-ui,sans-serif"
        font-size="12" fill="#475569" text-anchor="middle">hopscotch — life of a connection</text>
  <line x1="0" y1="40" x2="960" y2="40" stroke="#1a2535" stroke-width="1"/>

  <!-- ══ STEP 1: App ════════════════════════════════════════════════════════ -->
  <rect x="16" y="70" width="130" height="200" rx="9" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="16" y="70" width="130" height="4" rx="2" fill="#38bdf8"/>
  <circle cx="34" cy="90" r="10" fill="#38bdf8" opacity=".12" stroke="#38bdf8" stroke-width="1"/>
  <text x="34" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="11" font-weight="700" fill="#38bdf8" text-anchor="middle">1</text>
  <text x="81" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Application</text>
  <line x1="24" y1="104" x2="138" y2="104" stroke="#1a2535" stroke-width=".7"/>
  <text x="81" y="124" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569" text-anchor="middle">TCP connect</text>
  <text x="81" y="140" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#38bdf8" text-anchor="middle">127.0.0.1:1080</text>
  <line x1="24" y1="153" x2="138" y2="153" stroke="#1a2535" stroke-width=".7"/>
  <text x="81" y="170" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569" text-anchor="middle">SOCKS5</text>
  <text x="81" y="185" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569" text-anchor="middle">CONNECT</text>
  <text x="81" y="206" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">api.prod.internal</text>
  <text x="81" y="221" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">:443</text>
  <text x="81" y="258" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548" text-anchor="middle">browser / curl /</text>
  <text x="81" y="271" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548" text-anchor="middle">any SOCKS5 client</text>

  <!-- Arrow 1→2 -->
  <line x1="146" y1="170" x2="166" y2="170" stroke="#38bdf8" stroke-width="1.8" marker-end="url(#fc-a)"/>

  <!-- ══ STEP 2: Rule Engine ════════════════════════════════════════════════ -->
  <rect x="170" y="70" width="154" height="200" rx="9" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="170" y="70" width="154" height="4" rx="2" fill="#38bdf8"/>
  <circle cx="190" cy="90" r="10" fill="#38bdf8" opacity=".12" stroke="#38bdf8" stroke-width="1"/>
  <text x="190" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="11" font-weight="700" fill="#38bdf8" text-anchor="middle">2</text>
  <text x="247" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Rule Engine</text>
  <line x1="178" y1="104" x2="316" y2="104" stroke="#1a2535" stroke-width=".7"/>
  <text x="247" y="122" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569" text-anchor="middle">host extracted:</text>
  <text x="247" y="137" font-family="'JetBrains Mono','Courier New',monospace" font-size="10.5" fill="#e2e8f0" text-anchor="middle">api.prod.internal</text>
  <line x1="178" y1="149" x2="316" y2="149" stroke="#1a2535" stroke-width=".7"/>
  <text x="247" y="165" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">check: 10.215.11.0/24?</text>
  <text x="316" y="165" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#334155" text-anchor="end">✗</text>
  <text x="247" y="181" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">check: 10.215.0.0/20?</text>
  <text x="316" y="181" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#334155" text-anchor="end">✗</text>
  <text x="247" y="197" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#38bdf8" text-anchor="middle">check: *.prod.internal?</text>
  <text x="316" y="197" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#34d399" text-anchor="end">✓</text>
  <rect x="184" y="208" width="118" height="22" rx="5" fill="rgba(52,211,153,.08)" stroke="rgba(52,211,153,.2)" stroke-width="1"/>
  <text x="243" y="223" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#34d399" text-anchor="middle">→ prod-jump</text>
  <text x="247" y="263" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548" text-anchor="middle">first match wins</text>

  <!-- Arrow 2→3 -->
  <line x1="324" y1="170" x2="344" y2="170" stroke="#34d399" stroke-width="1.8" marker-end="url(#fc-ag)"/>

  <!-- ══ STEP 3: SSH Tunnel ═════════════════════════════════════════════════ -->
  <rect x="348" y="70" width="148" height="200" rx="9" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="348" y="70" width="148" height="4" rx="2" fill="#34d399"/>
  <circle cx="368" cy="90" r="10" fill="#34d399" opacity=".12" stroke="#34d399" stroke-width="1"/>
  <text x="368" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">3</text>
  <text x="422" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">SSH Tunnel</text>
  <line x1="356" y1="104" x2="488" y2="104" stroke="#1a2535" stroke-width=".7"/>
  <text x="422" y="122" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569" text-anchor="middle">tunnel status:</text>
  <circle cx="396" cy="137" r="3.5" fill="#34d399"/>
  <text x="407" y="141" font-family="'JetBrains Mono','Courier New',monospace" font-size="10.5" fill="#34d399">connected</text>
  <line x1="356" y1="151" x2="488" y2="151" stroke="#1a2535" stroke-width=".7"/>
  <text x="422" y="167" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">prod-jump:22</text>
  <text x="422" y="182" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">local port :1082</text>
  <line x1="356" y1="194" x2="488" y2="194" stroke="#1a2535" stroke-width=".7"/>
  <text x="422" y="210" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">open new channel</text>
  <text x="422" y="225" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#e2e8f0" text-anchor="middle">direct-tcpip</text>
  <text x="422" y="263" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548" text-anchor="middle">long-lived connection</text>

  <!-- Arrow 3→4 -->
  <line x1="496" y1="170" x2="516" y2="170" stroke="#34d399" stroke-width="1.8" marker-end="url(#fc-ag)"/>

  <!-- ══ STEP 4: Jump Host ══════════════════════════════════════════════════ -->
  <rect x="520" y="70" width="148" height="200" rx="9" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="520" y="70" width="148" height="4" rx="2" fill="#34d399"/>
  <circle cx="540" cy="90" r="10" fill="#34d399" opacity=".12" stroke="#34d399" stroke-width="1"/>
  <text x="540" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">4</text>
  <text x="594" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Jump Host</text>
  <line x1="528" y1="104" x2="660" y2="104" stroke="#1a2535" stroke-width=".7"/>
  <text x="594" y="122" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569" text-anchor="middle">SSH server</text>
  <text x="594" y="137" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#475569" text-anchor="middle">accepts channel</text>
  <line x1="528" y1="149" x2="660" y2="149" stroke="#1a2535" stroke-width=".7"/>
  <text x="594" y="165" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">TCP connect to</text>
  <text x="594" y="180" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">api.prod.internal</text>
  <text x="594" y="195" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">:443</text>
  <text x="594" y="225" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">reachable from</text>
  <text x="594" y="240" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">private network</text>
  <text x="594" y="263" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548" text-anchor="middle">SSH direct-tcpip</text>

  <!-- Arrow 4→5 -->
  <line x1="668" y1="170" x2="688" y2="170" stroke="#34d399" stroke-width="1.8" marker-end="url(#fc-ag)"/>

  <!-- ══ STEP 5: Target Server ══════════════════════════════════════════════ -->
  <rect x="692" y="70" width="252" height="200" rx="9" fill="#0f1623" stroke="#1a2535" stroke-width="1"/>
  <rect x="692" y="70" width="252" height="4" rx="2" fill="#818cf8"/>
  <circle cx="712" cy="90" r="10" fill="#818cf8" opacity=".12" stroke="#818cf8" stroke-width="1"/>
  <text x="712" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="11" font-weight="700" fill="#818cf8" text-anchor="middle">5</text>
  <text x="818" y="95" font-family="'Space Grotesk',system-ui,sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Target Server</text>
  <line x1="700" y1="104" x2="936" y2="104" stroke="#1a2535" stroke-width=".7"/>
  <text x="818" y="130" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#e2e8f0" text-anchor="middle">api.prod.internal</text>
  <text x="818" y="146" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#e2e8f0" text-anchor="middle">:443</text>
  <line x1="700" y1="158" x2="936" y2="158" stroke="#1a2535" stroke-width=".7"/>
  <text x="818" y="175" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">sees: jump host IP</text>
  <text x="818" y="190" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#475569" text-anchor="middle">as the client</text>
  <line x1="700" y1="202" x2="936" y2="202" stroke="#1a2535" stroke-width=".7"/>
  <text x="818" y="218" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#818cf8" text-anchor="middle">response travels</text>
  <text x="818" y="233" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#818cf8" text-anchor="middle">back the same path</text>
  <text x="818" y="263" font-family="'JetBrains Mono','Courier New',monospace" font-size="9" fill="#283548" text-anchor="middle">inside private network</text>

  <!-- ══ RETURN FLOW ═══════════════════════════════════════════════════════ -->
  <path d="M818,290 L818,316 L81,316 L81,290" stroke="#818cf8" stroke-width="1.3" stroke-dasharray="5,3" fill="none" opacity=".5" marker-end="url(#fc-ar)"/>
  <text x="450" y="312" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#818cf8" text-anchor="middle" opacity=".7">response travels back · same SSH tunnel · encrypted end-to-end</text>

  <!-- ══ ENCRYPTION LAYER ══════════════════════════════════════════════════ -->
  <rect x="16" y="338" width="928" height="42" rx="8" fill="#0a1120" stroke="#1a2535" stroke-width="1"/>
  <rect x="170" y="342" width="670" height="34" rx="6" fill="rgba(56,189,248,.04)" stroke="rgba(56,189,248,.12)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="505" y="363" font-family="'JetBrains Mono','Courier New',monospace" font-size="9.5" fill="#38bdf8" text-anchor="middle" opacity=".7">SSH encryption · AES-256 · all data encrypted between hopscotch and the jump host</text>

  <!-- Footer -->
  <line x1="0" y1="390" x2="960" y2="390" stroke="#1a2535" stroke-width="1"/>
  <text x="480" y="410" font-family="'JetBrains Mono','Courier New',monospace" font-size="10" fill="#334155" text-anchor="middle">
    The app sees a plain TCP connection · routing and encryption are completely transparent
  </text>
</svg>
