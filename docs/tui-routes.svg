  <rect width="960" height="36" rx="12" fill="#161f2e"/>
  <rect y="24" width="960" height="12" fill="#161f2e"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="480" y="23" font-family="'Space Grotesk',system-ui,sans-serif"
