services:
  hopscotch:
    image: ghcr.io/USER/hopscotch:latest
    container_name: hopscotch

    # Restart automatically on crash or host reboot
    restart: unless-stopped

    ports:
      # SOCKS5 proxy port – configure this in FoxyProxy and ALL_PROXY
      - "8080:8080"
      # Admin HTTP port – health check and Prometheus metrics
      # Remove this line if external access is not needed
      - "9090:9090"

    volumes:
      # Config file – read-only mount
      - ./config.yaml:/etc/hopscotch/config.yaml:ro

      # SSH keys directory – read-only mount
      # chmod 600 is required on every key file!
      # e.g. ./keys/id_prod → /etc/hopscotch/keys/id_prod
      - ./keys:/etc/hopscotch/keys:ro

    environment:
      - TZ=Europe/Budapest
      # Disable known_hosts verification (not recommended in production)
      # - HOPSCOTCH_INSECURE_SKIP_KNOWN_HOSTS=true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
