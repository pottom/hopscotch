<svg width="960" height="340" viewBox="0 0 960 340" xmlns="http://www.w3.org/2000/svg">
  <!-- terminal chrome -->
  <rect width="960" height="340" rx="10" fill="#0d1117"/>
  <rect width="960" height="30" rx="10" fill="#161f2e"/>
  <rect y="20" width="960" height="10" fill="#161f2e"/>
  <circle cx="20" cy="15" r="5.5" fill="#ff5f56"/>
  <circle cx="40" cy="15" r="5.5" fill="#ffbd2e"/>
  <circle cx="60" cy="15" r="5.5" fill="#27c93f"/>
  <text x="480" y="20" font-family="'Space Grotesk',system-ui,sans-serif"
        font-size="11" fill="#475569" text-anchor="middle">hopscotch — status</text>

  <!-- TUI area bg -->
  <rect y="30" width="960" height="310" fill="#080c14"/>

  <!-- ══ TUI HEADER ══ -->
  <rect y="30" width="960" height="42" fill="#0a1120"/>
  <text x="22" y="58" font-family="'Space Grotesk',system-ui,sans-serif"
