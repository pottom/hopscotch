  <circle cx="64" cy="63" r="4.2" fill="#818cf8" opacity=".9"/>
  <path d="M48 63 Q56 51 60 63" stroke="url(#tr-lg)" stroke-width="2.1" stroke-linecap="round" fill="none"/>
  <circle cx="54" cy="54" r="2.4" fill="#38bdf8" opacity=".85"/>
  <!-- App name + version -->
  <text x="78" y="69" font-family="'Space Grotesk',system-ui,sans-serif"
