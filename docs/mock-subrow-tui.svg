  <text x="804" y="58" font-family="'Space Grotesk',system-ui,sans-serif"
        font-size="12" font-weight="500" fill="#475569">Logs</text>
  <text x="848" y="58" font-family="'Space Grotesk',system-ui,sans-serif"
        font-size="12" font-weight="500" fill="#475569">Docs</text>
  <line x1="0" y1="72" x2="960" y2="72" stroke="#1a2535" stroke-width="1"/>

  <!-- ══ CONTENT (monospace) ══ -->
  <!-- all text in JetBrains Mono, font-size=11.5, line-height=20 -->

  <!-- stats bar -->
  <text x="18" y="92" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#38bdf8">↓ 3.2 KB/s</text>
  <text x="108" y="92" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#1a2535">·</text>
  <text x="120" y="92" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#818cf8">↑ 980 B/s</text>
  <text x="206" y="92" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#1a2535">·</text>
  <text x="218" y="92" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#475569">2 active</text>
  <line x1="0" y1="100" x2="960" y2="100" stroke="#1a2535" stroke-width="1"/>

  <!-- section heading -->
  <text x="18" y="117" font-family="'JetBrains Mono','Courier New',monospace" font-size="10.5" fill="#475569" letter-spacing="1.5">  TUNNEL              HOST                   VPN            PORT   STATUS               UPTIME     RC   ↓               ↑               CONN</text>
  <line x1="0" y1="124" x2="960" y2="124" stroke="#1a2535" stroke-width="1"/>

  <!-- ROW 1: go-a-scb connected, no error -->
  <text x="18" y="141" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#e2e8f0">  go-a-scb            10.1.0.5:22            —              1080   </text>
  <text x="416" y="141" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#34d399">● connected          </text>
  <text x="582" y="141" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#475569">8h 46m     0    </text>
  <text x="704" y="141" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#38bdf8">↓ 2.1 KB/s      </text>
  <text x="818" y="141" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#818cf8">↑ 640 B/s       </text>
  <text x="924" y="141" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#475569">3</text>
  <line x1="0" y1="150" x2="960" y2="150" stroke="rgba(255,255,255,.03)" stroke-width="1"/>

  <!-- ROW 2: go-b-scb connecting, WITH error sub-line -->
  <text x="18" y="167" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#e2e8f0">  go-b-scb            10.2.0.8:22            corp-vpn       1081   </text>
  <text x="416" y="167" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#fbbf24">◌ connecting         </text>
  <text x="582" y="167" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#fbbf24">in 28s     3    </text>
  <text x="704" y="167" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#38bdf8">↓ 0 B/s         </text>
  <text x="818" y="167" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#818cf8">↑ 0 B/s         </text>
  <text x="924" y="167" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#475569">0</text>
  <!-- error sub-line — second line, indented, red -->
  <text x="18" y="183" font-family="'JetBrains Mono','Courier New',monospace" font-size="10.5" fill="#f87171" opacity=".8">    ✗ SSH handshake timeout after 15s: dial tcp 10.2.0.8:22: i/o timeout</text>
  <line x1="0" y1="191" x2="960" y2="191" stroke="rgba(255,255,255,.03)" stroke-width="1"/>

  <!-- ROW 3: go-c-scb connecting, WITH error sub-line -->
  <text x="18" y="208" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#e2e8f0">  go-c-scb            10.3.0.2:22            —              1082   </text>
  <text x="416" y="208" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#f87171">✗ connecting         </text>
  <text x="582" y="208" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#f87171">in 5m 12s  11   </text>
  <text x="704" y="208" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#38bdf8">↓ 0 B/s         </text>
  <text x="818" y="208" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#818cf8">↑ 0 B/s         </text>
  <text x="924" y="208" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#475569">0</text>
  <!-- error sub-line -->
  <text x="18" y="224" font-family="'JetBrains Mono','Courier New',monospace" font-size="10.5" fill="#f87171" opacity=".8">    ✗ ssh: unable to authenticate — no supported methods remain [publickey]</text>
  <line x1="0" y1="232" x2="960" y2="232" stroke="rgba(255,255,255,.03)" stroke-width="1"/>

  <!-- ROW 4: direct -->
  <text x="18" y="249" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#a78bfa">  direct</text>
  <text x="136" y="249" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#1a2535">                                                              </text>
  <text x="704" y="249" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#38bdf8">↓ 1.1 KB/s      </text>
  <text x="818" y="249" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#818cf8">↑ 340 B/s       </text>
  <text x="924" y="249" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#475569">1</text>
  <line x1="0" y1="258" x2="960" y2="258" stroke="#1a2535" stroke-width="1"/>

  <!-- caption -->
  <text x="480" y="318" font-family="'Space Grotesk',system-ui,sans-serif" font-size="11"
        fill="#334155" text-anchor="middle">TUI — hibaüzenet második sorban jelenik meg az érintett tunnel alatt</text>
</svg>
