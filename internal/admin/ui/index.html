<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hopscotch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><circle cx='6' cy='26' r='5' fill='%2338bdf8'/><circle cx='30' cy='26' r='5' fill='%23818cf8'/><path d='M11 26 Q18 7 25 26' stroke='%2338bdf8' stroke-width='2.5' stroke-linecap='round' fill='none'/></svg>">
  <link rel="stylesheet" href="/vendor/pico.min.css">
  <link rel="stylesheet" href="/style.css">
  <script src="/vendor/chart.umd.min.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/ansi_up.js"></script>
  <!-- app.js must load before Alpine so alpine:init listener is registered first -->
  <script src="/app.js"></script>
  <script defer src="/vendor/alpine.min.js"></script>
</head>
<body x-data>

<header class="header">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="6"  cy="26" r="5" fill="#38bdf8" opacity=".9"/>
      <circle cx="30" cy="26" r="5" fill="#818cf8" opacity=".9"/>
      <path d="M11 26 Q18 7 25 26" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <circle id="hop-dot" cx="18" cy="14.5" r="2.6" fill="#38bdf8" opacity=".85"/>
      <defs>
        <linearGradient id="g" x1="11" y1="26" x2="25" y2="26" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#38bdf8"/>
          <stop offset="100%" stop-color="#818cf8"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="logo-wordmark">hopscotch</span>
  </div>

  <span class="badge" :class="$store.hop.meta.status" x-text="$store.hop.meta.status"></span>
  <div class="header-meta">
    <span x-text="$store.hop.meta.version"></span><template x-if="$store.hop.meta.latest_version"><span class="update-badge" x-text="'⚡' + $store.hop.meta.latest_version"></span></template>
    <span class="header-sep">·</span>
    <span x-text="'PID ' + $store.hop.meta.pid"></span>
    <span class="header-sep">·</span>
    <span x-text="'up ' + $store.hop.meta.uptime"></span>
    <span class="header-sep">·</span>
    <span class="uplink-badge" :class="$store.hop.meta.uplink ? 'up' : 'down'"
          x-text="$store.hop.meta.uplink ? '● ' + ($store.hop.meta.uplink_iface || 'link') : '○ no link'"></span>
  </div>
</header>

<nav class="tab-bar" id="tab-bar">
  <a class="active" data-tab="status" href="#" onclick="switchTab('status');return false">Status</a>
  <a data-tab="patterns"  href="#" onclick="switchTab('patterns');return false">Patterns</a>
  <a data-tab="logs"    href="#" onclick="switchTab('logs');return false">Logs</a>
  <a data-tab="docs"    href="#" onclick="switchTab('docs');return false">Docs</a>
</nav>

<!-- ── STATUS TAB ─────────────────────────────────────────────────────────── -->
<div id="panel-status" class="tab-panel active" style="flex-direction:column;">

  <div class="stats-bar">
    <span class="stats-in"   x-text="'↓ ' + fmtBytes($store.hop.totalStats().bpsIn)  + '/s'"></span>
    <span class="stats-sep">·</span>
    <span class="stats-out"  x-text="'↑ ' + fmtBytes($store.hop.totalStats().bpsOut) + '/s'"></span>
    <span class="stats-sep">·</span>
    <span class="stats-conn" x-text="$store.hop.totalStats().active + ' conn total'"></span>
  </div>

  <div class="status-scroll">

    <table class="status-table">
      <colgroup>
        <col class="col-name"><col class="col-host"><col class="col-vpn">
        <col class="col-port"><col class="col-status"><col class="col-uptime">
        <col class="col-rc"><col class="col-bps"><col class="col-bps">
        <col class="col-conn"><col class="col-msg">
      </colgroup>

      <!-- VPN section -->
      <tbody id="vpn-section" style="display:none">
        <tr class="sh-label-row"><td colspan="11">VPN</td></tr>
        <tr class="sh-head-row">
          <th>Name</th><th>Host</th><th>Iface</th><th></th>
          <th>Status</th><th>Uptime</th><th>RC</th>
          <th></th><th></th><th></th><th>Message</th>
        </tr>
        <!-- rows injected by JS -->
      </tbody>
      <tbody id="vpn-tbody"></tbody>

      <!-- Tunnels section -->
      <tbody>
        <tr class="sh-label-row"><td colspan="11">Tunnels</td></tr>
        <tr class="sh-head-row">
          <th>Name</th><th>Host</th><th>VPN</th><th>Port</th>
          <th>Status</th><th>Uptime</th><th>RC</th>
          <th>↓</th><th>↑</th><th>Conn</th><th>Message</th>
        </tr>
      </tbody>
      <tbody id="tunnel-tbody">
        <tr><td colspan="11" class="st-loading">loading…</td></tr>
      </tbody>
    </table>

  </div>
</div>

<!-- ── LOGS TAB ───────────────────────────────────────────────────────────── -->
<div id="panel-logs" class="tab-panel">
  <div class="log-wrap">
    <div class="log-header">
      <span class="log-label">Live log stream</span>
      <div class="log-level-chips">
        <button class="log-chip" data-level="DEBUG" onclick="setLogLevel('DEBUG')">ALL</button>
        <button class="log-chip active" data-level="INFO"  onclick="setLogLevel('INFO')">INFO</button>
        <button class="log-chip" data-level="WARN"  onclick="setLogLevel('WARN')">WARN</button>
        <button class="log-chip" data-level="ERROR" onclick="setLogLevel('ERROR')">ERR</button>
      </div>
    </div>
    <div class="log-scroll" id="log-scroll"></div>
  </div>
</div>

<!-- ── ROUTES TAB ─────────────────────────────────────────────────────────── -->
<div id="panel-patterns" class="tab-panel">
  <div class="routes-wrap">
    <div class="routes-label">URL → Tunnel routing rules</div>

    <div class="routes-tester">
      <input type="text" id="routes-tester-input" class="routes-tester-input"
             placeholder="test a URL or hostname, e.g. api.example.com"
             oninput="routesTesterUpdate(this.value)">
      <div class="routes-tester-result" id="routes-tester-result"></div>
    </div>

    <table class="routes-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Pattern</th>
          <th>Via</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="routes-tbody">
        <tr><td colspan="4" class="routes-empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── DOCS TAB ───────────────────────────────────────────────────────────── -->
<div id="panel-docs" class="tab-panel">
  <div class="docs-wrap">
    <div class="docs-body" id="docs-content">
      <p style="color:var(--muted)">Loading…</p>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-ports">
    <div class="port-item">
      <span>SOCKS5</span>
      <span x-text="':' + $store.hop.meta.proxy_port"></span>
    </div>
    <div class="port-item">
      <span>ADMIN</span>
      <span x-text="':' + $store.hop.meta.admin_port"></span>
    </div>
  </div>
  <div id="footer-ts"></div>
</footer>

</body>
</html>
