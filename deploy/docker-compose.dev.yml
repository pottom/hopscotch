# Development environment – builds from source, no restart policy
# Usage: docker compose -f deploy/docker-compose.dev.yml up
services:
  hopscotch:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: hopscotch-dev
    restart: "no"
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./config.yaml:/etc/hopscotch/config.yaml:ro
      - ./keys:/etc/hopscotch/keys:ro
    environment:
      - TZ=Europe/Budapest
      - HOPSCOTCH_INSECURE_SKIP_KNOWN_HOSTS=true
    command: ["start", "--foreground", "--verbose"]
